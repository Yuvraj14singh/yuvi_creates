{% for lead in leads %}<a class="lead-row" href="{{ lead.get_absolute_url }}"><div><strong>{{ lead.business_name }}</strong><span>{{ lead.contact_person|default:"No contact person" }}</span></div><span class="badge priority-{{ lead.priority }}">{{ lead.get_priority_display }}</span><span class="badge status-{{ lead.status }}">{{ lead.get_status_display }}</span><span class="followup {{ lead.follow_up_status|slugify }}">{{ lead.next_follow_up_date|default:"Not set" }}</span></a>{% empty %}<div class="empty-state">No leads found here.</div>{% endfor %}
