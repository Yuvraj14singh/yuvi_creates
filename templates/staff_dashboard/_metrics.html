<div class="metric-grid">

    <article><span>Replies</span><strong>{{ replies_received }}</strong></article><article><span>Demo Requests</span><strong>{{ demo_requests }}</strong></article>
    <article class="due"><span>Due Today</span><strong>{{ due_today_count }}</strong></article><article class="overdue"><span>Overdue</span><strong>{{ overdue_count }}</strong></article>
